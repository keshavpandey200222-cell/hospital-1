services:
  # Backend Service (Spring Boot)
  - type: web
    name: hms-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: hms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # ML Service (Python/FastAPI)
  - type: web
    name: hms-ml-service
    env: docker
    dockerContext: python-ml-service
    dockerfilePath: python-ml-service/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8000

  # Frontend Service (Next.js)
  - type: web
    name: hms-frontend
    env: node
    plan: free
    region: singapore
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: hms-backend
          property: host
      - key: NEXT_PUBLIC_ML_URL
        fromService:
          type: web
          name: hms-ml-service
          property: host

databases:
  - name: hms-db
    plan: free
    region: singapore
