services:
  # Backend Service (Spring Boot)
  - type: web
    name: hms-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: hms-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hms-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: hms-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: hms-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: hms-db
          property: password
      - key: JWT_SECRET
        generateValue: true

  # ML Service (Python/FastAPI)
  - type: web
    name: hms-ml-service
    env: docker
    dockerContext: python-ml-service
    dockerfilePath: python-ml-service/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 10000

  # Frontend Service (Next.js)
  - type: web
    name: hms-frontend
    env: node
    plan: free
    region: singapore
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: hms-backend
          property: host
      - key: NEXT_PUBLIC_ML_URL
        fromService:
          type: web
          name: hms-ml-service
          property: host

databases:
  - name: hms-db
    plan: free
    region: singapore
